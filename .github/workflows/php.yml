name: PHP Composer

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

permissions:
    contents: read

jobs:
    qa:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.4"
                  coverage: none

            - name: Validate composer.json
              run: composer validate --strict --no-check-lock

            - name: Install dependencies
              run: composer update --prefer-dist --no-progress --no-interaction

            - name: Run cs-check
              run: composer cs-check

            - name: Run phpstan
              run: composer phpstan

            - name: Run phpunit
              run: composer test

            - name: Run benchmark report (non-blocking)
              continue-on-error: true
              run: composer benchmark > benchmarks/report.md

            - name: Upload benchmark artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: benchmark-report-php8.4
                  path: |
                      benchmarks/report.md
                      benchmarks/report.json

    compatibility:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - php-version: "8.2"
                      mezzio_router: "^3.15"
                      mezzio_router_label: "3.15"
                    - php-version: "8.2"
                      mezzio_router: "^4.1"
                      mezzio_router_label: "4.1"
                    - php-version: "8.5"
                      mezzio_router: "^4.1"
                      mezzio_router_label: "4.1"

        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-version }}
                  coverage: none

            - name: Validate composer.json
              run: composer validate --strict --no-check-lock

            - name: Prepare runtime-only composer manifest
              run: php -r '$composer = json_decode(file_get_contents("composer.json"), true, 512, JSON_THROW_ON_ERROR); unset($composer["require-dev"]); file_put_contents("composer.json", json_encode($composer, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . PHP_EOL);'

            - name: Install runtime dependencies for matrix
              run: composer update --with "mezzio/mezzio-router:${{ matrix.mezzio_router }}" --prefer-dist --no-progress --no-interaction --no-dev
