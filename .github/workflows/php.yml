name: PHP Composer

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

permissions:
    contents: read

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    qa:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php-version: ["8.2", "8.3", "8.4", "8.5"]
                mezzio-router:
                    - version: "^3.15"
                      label: "3.15"
                    - version: "^4.1"
                      label: "4.1"
                mezzio-tooling: [true, false]
        steps:
            - uses: actions/checkout@v5

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-version }}
                  coverage: none

            - name: Validate composer.json
              run: composer validate --strict --no-check-lock

            - name: Install dependencies (without mezzio-tooling)
              if: ${{ !matrix.mezzio-tooling }}
              run: composer update --with "mezzio/mezzio-router:${{ matrix.mezzio-router.version }}" --prefer-dist --no-progress --no-interaction

            - name: Install dependencies (with mezzio-tooling)
              if: ${{ matrix.mezzio-tooling }}
              run: |
                  composer update --with "mezzio/mezzio-router:${{ matrix.mezzio-router.version }}" --prefer-dist --no-progress --no-interaction
                  composer require --dev mezzio/mezzio-tooling --no-interaction

            - name: Run cs-check
              run: composer cs-check

            - name: Run phpstan
              run: composer phpstan

            - name: Run phpunit
              run: composer test

            - name: Run benchmark report (non-blocking)
              continue-on-error: true
              run: composer benchmark > benchmarks/report.md

            - name: Upload benchmark artifacts
              if: always()
              uses: actions/upload-artifact@v6
              with:
                  name: benchmark-report-php${{ matrix.php-version }}-router${{ matrix.mezzio-router.label }}
                  path: |
                      benchmarks/report.md
                      benchmarks/report.json
